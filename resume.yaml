# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.6/schema.json
cv:
  name: Josh Noll
  website: https://joshrnoll.com
  social_networks:
    - network: LinkedIn
      username: joshrnoll
    - network: GitHub
      username: joshrnoll
  sections:
    summary:
      - Army officer and IT professional with 5+ years of hands-on experience architecting and delivering cloud-based solutions in secure federal environments. Proven track record of translating complex technical requirements into scalable architectures, leading technical evaluations, and advising senior stakeholders on solution design. Deep expertise in CI/CD, DevSecOps, cloud platforms, and infrastructure automation.

    experience:
      - company: Unstructured
        position: Infrastructure Engineer (SkillBridge)
        start_date: 2026-02
        end_date: present
        highlights:
          - Supporting cloud infrastructure powering the platform, including Kubernetes orchestration, CI/CD pipeline optimization, and Infrastructure as Code development.
          - Assisting with infrastructure automation, deployment pipelines, and configuration management to improve platform reliability and delivery velocity.
          - Contributing to documentation, runbooks, and operational knowledge sharing to strengthen team practices.
          - Participating in infrastructure planning discussions and incident reviews to identify delivery improvements and build operational awareness.

      - company: US Army
        position: Data and Information Systems Engineer
        start_date: 2021-01
        end_date: 2026-02
        highlights:
          - Architected and delivered an enterprise search solution using Azure Web App Service, Azure AI Search, Azure Data Factory and Azure Data Lake, integrating 22TB of raw data into 2TB of indexed, accessible data and reducing stakeholder data retrieval time from 20+ minutes to seconds.
          - Designed and presented technical solution architectures to 5+ senior stakeholders, translating complex requirements into clear proposals, enabling buy-in and directly aligning technical solutions with mission objectives.
          - Authored and successfully delivered an enterprise cybersecurity policy by aligning technical security controls with mission priorities, achieving senior leadership buy-in and reducing violations by over 75%.
          - Directed planning and implementation of a robust off-site network connection, advising key stakeholders and delivering reliable connectivity to over 50 users under challenging operational conditions.
          - Installed resilient domain architecture across multiple sites, enabling service uptime and reliability in secure, resource-constrained environments.
          - Developed and drove adoption of a custom PowerShell automation module for programmatic user account auditing and management, doubling the speed of service desk ticket closures.

    volunteering:
      - company: Arrowhead Research
        position: Director of Programming
        start_date: 2026-01
        end_date: present
        highlights:
          - Delivered a technical presentation on open-source methodology to a panel of 5 industry experts and DoD leaders including the US Army CTO, demonstrating the ability to lead demos, communicate technical value to senior stakeholders, and advocate for technology adoption.

      - company: Cybersecurity Canon
        position: Web Developer
        start_date: 2025-11
        end_date: present
        highlights:
          - Architecting a replacement platform using NextJS and Supabase, presenting architectural trade-offs and migration strategy to leadership to enable enhanced extensibility and self-service capabilities.

    projects:
      - name: "[Homelab as Code](https://github.com/joshrnoll/homelab-as-code)"
        summary: Architected a GitOps-driven CI/CD pipeline deploying services to Kubernetes on Talos Linux using FluxCD, Tailscale for secure networking, and SOPS/age for encrypted secrets management. Demonstrated end-to-end solution design, documentation, and Infrastructure as Code delivery.

      - name: "[My Cloud Resume](https://resume.joshrnoll.com)"
        summary: Designed and deployed a cloud-hosted resume website to Azure Blob Storage using HTML, CSS, and JavaScript with automated CI/CD via GitHub Actions, demonstrating end-to-end solution delivery on a cloud platform.

      - name: "[Black Relay](https://github.com/joshrnoll/black-relay)"
        summary: Architected a full-stack IoT platform integrating JavaScript, Express, MQTT, and MongoDB with a CI/CD pipeline using GitHub Actions to build and deploy container images, enabling data-driven decision-making in resource-constrained environments.

      - name: "[Homelab Ansible Collection](https://github.com/joshrnoll/ansible-collection-homelab)"
        summary: Published a suite of modular Ansible roles to Ansible Galaxy, enabling repeatable server baselines and automated deployment of containerized services with Tailscale networking, Traefik reverse proxy and Cloudflare DNS integration.

    education:
      - label: Webster University
        details: MA, Information Technology Management, May 2022

      - label: University of Wisconsin - Eau Claire
        details: BA, German - Liberal Arts, May 2017

      - label: Galvanize
        details: Software Development Immersive (SDI), September 2025

      - label: US Army Cyber Center of Excellence (CCOE)
        details: Graduate, Information Systems Engineering Course, October 2021

    skills:
      - Solution Architecture, CI/CD, DevSecOps, Git, GitOps, Azure, AWS, Kubernetes, Docker, Ansible, Python, PowerShell, Bash, Linux, FluxCD, VMWare, Proxmox, JavaScript, TypeScript, React, NextJS, HTML, CSS, Nginx, Traefik, Wireguard, Tailscale

    certifications:
      - label: ISC2
        details: "[Certified Information Systems Security Professional (CISSP)](https://www.credly.com/badges/4df1206d-dc14-4302-83f4-cc5f8e76e2dc/public_url)"
      - label: Cisco
        details: "[Cisco Certified Networking Associate (CCNA)](https://www.credly.com/badges/218f2074-76ba-4d60-b0d5-5bc83c515052/public_url)"
      - label: Azure
        details: "[Microsoft Azure Administrator Associate (Az-104)](https://learn.microsoft.com/en-us/users/joshrnoll/credentials/A419160A7DC41331?ref=https%3A%2F%2Fjoshrnoll.com%2F), [Microsoft Azure Fundamentals (Az-900)](https://learn.microsoft.com/api/credentials/share/en-us/joshrnoll/B91E76B27D0D2605?sharingId=236C17A9E269164)"
      - label: CompTIA
        details: "[CompTIA SecurityX](https://www.credly.com/badges/ba45cd0c-fe71-4c6f-bfbf-9b8acdeeff9a/public_url), [CompTIA Security+](https://www.credly.com/badges/76550d7d-a270-421c-8436-b0123897fdf8/public_url), [CompTIA Network+](https://www.credly.com/badges/cf3b9100-9b51-488b-84d5-4beb661bee83/public_url), [CompTIA Project+](https://www.credly.com/badges/e5ef6d2e-bedd-48c2-a1d0-7b750d418908/public_url)"

design:
  theme: engineeringresumes
  page:
    top_margin: "0.25in"
    bottom_margin: "0.25in"
    left_margin: "0.25in"
    right_margin: "0.25in"
  typography:
    line_spacing: "0.2em"
  header:
    connections:
      show_icons: true
    space_below_name: "0.3cm"
    space_below_headline: "0.2cm"
    space_below_connections: "0.2cm"
  sections:
    space_between_regular_entries: "0.3em"
    space_between_text_based_entries: "0.1em"
  section_titles:
    line_thickness: "0.5pt"
    space_above: "0.3cm"
    space_below: "0.15cm"
  entries:
    highlights:
      bullet: "◦"
      nested_bullet: "-"
      space_left: "0cm"
      space_above: "0.08cm"
      space_between_items: "0.08cm"
      space_between_bullet_and_text: "0.3em"
  links:
    underline: true
    show_external_link_icon: true
  templates:
    experience_entry:
      main_column: |-
        **POSITION**, *COMPANY*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: "*DATE*"
locale:
  language: english

settings:
  current_date: "2026-02-13"
